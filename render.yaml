services:
  - type: web
    name: aurora-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    # Migrate, seed (idempotent), then serve. Render injects PORT and runs this via sh.
    dockerCommand: alembic upgrade head && python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false # paste the Neon connection string in the Render dashboard
      - key: CORS_ORIGINS
        value: '["https://aurora-pi-sable.vercel.app", "http://localhost:3000"]'
