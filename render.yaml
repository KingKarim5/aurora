services:
  - type: web
    name: aurora-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    # Startup (migrate, seed, serve) is the Dockerfile CMD; Render injects PORT.
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false # paste the Neon connection string in the Render dashboard
      - key: CORS_ORIGINS
        value: '["https://aurora-pi-sable.vercel.app", "http://localhost:3000"]'
